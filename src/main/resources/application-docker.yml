app:
  qdrant:
    enabled: true
    host: ${QDRANT_HOST:qdrant}
    port: ${QDRANT_PORT:6334}
    use-tls: ${QDRANT_USE_TLS:false}
    collection-name: ${QDRANT_COLLECTION:SimpleTikTok}
    dimension: ${QDRANT_DIMENSION:1024}
    payload-text-key: ${QDRANT_PAYLOAD_TEXT_KEY:text}
    api-key: ${QDRANT_API_KEY:}

spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:mq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:root}
    password: ${RABBITMQ_PASSWORD:123321}
    virtual-host: ${RABBITMQ_VHOST:/SimpleTikTok}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/simple_tiktok?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&tinyInt1isBit=false&allowLoadLocalInfile=true&allowLocalInfile=true&allowUrlInLocalInfile=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      database: ${REDIS_DATABASE:0}
